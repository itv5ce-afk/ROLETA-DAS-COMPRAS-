<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta da Sorte - Comidas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1e2b3a, #0f1a24);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #2a3f4e;
            padding: 30px 20px 35px;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 -5px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 650px;
            width: 100%;
        }

        h1 {
            color: #f7d44a;
            text-shadow: 0 3px 0 #8b6f1c, 0 5px 15px rgba(0, 0, 0, 0.6);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-top: -10px;
            margin-bottom: 15px;
            font-weight: 800;
            word-break: break-word;
        }

        .roleta-wrapper {
            position: relative;
            display: inline-block;
            margin: 0 auto;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1/1;
            border-radius: 50%;
            box-shadow: 0 0 0 12px #3d5a6d, 0 0 0 18px #1f3342, 0 15px 35px rgba(0, 0, 0, 0.8);
            background: #2c4050;
            transition: box-shadow 0.2s;
            cursor: pointer;
            touch-action: none;
        }

        canvas:active {
            box-shadow: 0 0 0 12px #4d6f86, 0 0 0 18px #2a4052, 0 10px 30px rgba(0, 0, 0, 0.9);
        }

        /* Ponteiro fixo (triângulo) */
        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 48px solid #f7d44a;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.6));
            z-index: 10;
            pointer-events: none;
        }
        .pointer::after {
            content: '';
            position: absolute;
            top: -54px;
            left: -12px;
            width: 24px;
            height: 24px;
            background: #f7d44a;
            border-radius: 50%;
            box-shadow: inset -2px -2px 6px rgba(0, 0, 0, 0.3);
        }

        .resultado {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff3d1;
            background: #1f3342;
            padding: 15px 20px;
            border-radius: 50px;
            display: inline-block;
            min-width: 220px;
            box-shadow: inset 0 -4px 0 #0b141c, 0 8px 18px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
            text-shadow: 0 2px 3px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }
        .resultado span {
            color: #f7d44a;
            font-weight: 800;
        }

        .btn-girar {
            margin-top: 20px;
            padding: 16px 50px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f2e3b;
            background: linear-gradient(145deg, #f7d44a, #e6b422);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 0 #8b6f1c, 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.08s linear;
            letter-spacing: 2px;
            touch-action: manipulation;
        }

        .btn-girar:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #6b4f12, 0 6px 20px rgba(0, 0, 0, 0.6);
        }

        .btn-girar:disabled {
            opacity: 0.5;
            transform: translateY(5px);
            box-shadow: 0 5px 0 #5a3f0e;
            pointer-events: none;
        }

        @media (max-width: 550px) {
            h1 {
                font-size: 1.7rem;
            }
            .btn-girar {
                padding: 14px 30px;
                font-size: 1.4rem;
            }
            .resultado {
                font-size: 1.4rem;
                min-width: 160px;
                padding: 12px 16px;
            }
            .pointer {
                top: -12px;
                border-left-width: 20px;
                border-right-width: 20px;
                border-top-width: 36px;
            }
            .pointer::after {
                top: -42px;
                left: -9px;
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ ROLETA DA SORTE</h1>
        <div class="roleta-wrapper">
            <canvas id="roletaCanvas" width="600" height="600"></canvas>
            <div class="pointer"></div>
        </div>
        <div class="resultado" id="resultadoDisplay">🎲 <span id="resultadoTexto">?</span></div>
        <button class="btn-girar" id="btnGirar">GIRAR</button>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('roletaCanvas');
            const ctx = canvas.getContext('2d');
            const resultadoTexto = document.getElementById('resultadoTexto');
            const btnGirar = document.getElementById('btnGirar');

            // Lista de comidas (10 itens)
            const comidas = [
                'PIZZA',
                'HAMBÚRGUER',
                'SUCHI',
                'CHURRASCO',
                'SOPA',
                'SALGADOS',
                'SORVETE',
                'LASANHA',
                'PASTEL',
                'COMIDA CASEIRA'
            ];

            // Cores vibrantes para cada fatia
            const cores = [
                '#FF6B6B', // vermelho
                '#FF9F43', // laranja
                '#FECA57', // amarelo
                '#48DBFB', // azul claro
                '#0ABDE3', // azul médio
                '#10AC84', // verde
                '#5F27CD', // roxo
                '#FF78C4', // rosa
                '#FF9FF3', // rosa claro
                '#A29BFE'  // lilás
            ];

            const NUM_FATIAS = comidas.length;
            const ANGULO_FATIA = (2 * Math.PI) / NUM_FATIAS;

            // Variáveis de estado
            let anguloAtual = 0;        // ângulo de rotação acumulado (em radianos)
            let girando = false;
            let animacaoId = null;

            // Dimensões do canvas (600x600)
            const W = 600;
            const H = 600;
            const RAIO = 270;           // raio do círculo da roleta
            const CENTRO_X = W / 2;
            const CENTRO_Y = H / 2;

            // ========== FUNÇÃO PARA DESENHAR A ROLETA ==========
            function desenharRoleta(angulo) {
                ctx.clearRect(0, 0, W, H);

                // Desenha cada fatia
                for (let i = 0; i < NUM_FATIAS; i++) {
                    const inicio = i * ANGULO_FATIA + angulo;
                    const fim = inicio + ANGULO_FATIA;

                    // Caminho da fatia
                    ctx.beginPath();
                    ctx.moveTo(CENTRO_X, CENTRO_Y);
                    ctx.arc(CENTRO_X, CENTRO_Y, RAIO, inicio, fim);
                    ctx.closePath();

                    // Cor da fatia
                    ctx.fillStyle = cores[i % cores.length];
                    ctx.fill();

                    // Borda da fatia
                    ctx.strokeStyle = '#1f3342';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();

                    // Texto da comida (centralizado na fatia)
                    const anguloMedio = inicio + ANGULO_FATIA / 2;
                    const textoRaio = RAIO * 0.65;
                    const x = CENTRO_X + Math.cos(anguloMedio) * textoRaio;
                    const y = CENTRO_Y + Math.sin(anguloMedio) * textoRaio;

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(anguloMedio + (anguloMedio > Math.PI / 2 ? Math.PI : 0));

                    ctx.font = 'bold 20px "Segoe UI", "Arial", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = 8;
                    ctx.fillText(comidas[i], 0, 0);
                    ctx.restore();
                }

                // Círculo central decorativo
                ctx.beginPath();
                ctx.arc(CENTRO_X, CENTRO_Y, 38, 0, 2 * Math.PI);
                ctx.fillStyle = '#f7d44a';
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#1f3342';
                ctx.lineWidth = 5;
                ctx.stroke();

                // Segundo círculo interno (detalhe)
                ctx.beginPath();
                ctx.arc(CENTRO_X, CENTRO_Y, 20, 0, 2 * Math.PI);
                ctx.fillStyle = '#1f3342';
                ctx.fill();
                ctx.strokeStyle = '#f7d44a';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // ========== FUNÇÃO PARA CALCULAR O RESULTADO ==========
            function obterIndicePorAngulo(angulo) {
                // Normaliza o ângulo para [0, 2*PI)
                let a = angulo % (2 * Math.PI);
                if (a < 0) a += 2 * Math.PI;

                // O ponteiro está no topo (ângulo -PI/2). Queremos saber qual fatia está na posição -PI/2.
                // O ângulo da roleta no ponto do ponteiro: (-PI/2 - angulo) 
                // Mas como a roleta gira, o ângulo que o ponteiro 'vê' é: ( -PI/2 - angulo )
                // Normalizamos e vemos em qual intervalo de fatia cai.
                let anguloPonteiro = (-Math.PI / 2 - angulo);
                // Normaliza para [0, 2*PI)
                anguloPonteiro = ((anguloPonteiro % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

                // Descobre o índice: cada fatia i está no intervalo [i*ANGULO_FATIA, (i+1)*ANGULO_FATIA)
                for (let i = 0; i < NUM_FATIAS; i++) {
                    const inicio = i * ANGULO_FATIA;
                    const fim = inicio + ANGULO_FATIA;
                    if (anguloPonteiro >= inicio && anguloPonteiro < fim) {
                        return i;
                    }
                }
                // Fallback (nunca deve ocorrer)
                return 0;
            }

            // ========== FUNÇÃO DE ANIMAÇÃO ==========
            function girarRoleta() {
                if (girando) return;
                girando = true;
                btnGirar.disabled = true;
                resultadoTexto.textContent = '...';

                // Ângulo alvo: pelo menos 5 voltas completas + um offset aleatório para parar em uma fatia aleatória
                const voltasExtras = 5 + Math.random() * 5; // entre 5 e 10 voltas
                const anguloFinal = anguloAtual + voltasExtras * 2 * Math.PI;

                // Duração da animação: entre 3.5s e 5.5s
                const duracao = 3500 + Math.random() * 2000;
                const inicioTempo = performance.now();

                // Função de easing (cubic-bezier ease-out)
                function easing(t) {
                    return 1 - Math.pow(1 - t, 3);
                }

                function animar(tempo) {
                    const tempoDecorrido = tempo - inicioTempo;
                    const progresso = Math.min(tempoDecorrido / duracao, 1);
                    const t = easing(progresso);

                    // Interpolação linear entre ângulo atual e ângulo final
                    const anguloInterpolado = anguloAtual + (anguloFinal - anguloAtual) * t;
                    desenharRoleta(anguloInterpolado);

                    if (progresso < 1) {
                        animacaoId = requestAnimationFrame(animar);
                    } else {
                        // Finalizou
                        anguloAtual = anguloFinal;
                        const indice = obterIndicePorAngulo(anguloAtual);
                        resultadoTexto.textContent = comidas[indice];
                        girando = false;
                        btnGirar.disabled = false;
                        animacaoId = null;
                    }
                }

                animacaoId = requestAnimationFrame(animar);
            }

            // ========== EVENTO DO BOTÃO ==========
            btnGirar.addEventListener('click', girarRoleta);

            // ========== DESENHO INICIAL ==========
            desenharRoleta(0);

            // ========== REDIMENSIONAMENTO (opcional) ==========
            // O canvas mantém proporção com CSS, mas se redimensionar a janela não afeta o desenho interno.

            // ========== TOQUE / CLICK NO CANVAS (opcional) ==========
            canvas.addEventListener('click', () => {
                if (!girando) girarRoleta();
            });

        })();
    </script>

</body>
</html>
